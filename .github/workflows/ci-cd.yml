name: CI CD for AKS

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: 20

jobs:
  build_test:
    name: Build + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend - install
        working-directory: backend
        run: npm ci

      - name: Backend - test
        working-directory: backend
        run: npm test

      - name: Frontend - install
        working-directory: frontend
        run: npm ci

      - name: Frontend - test
        working-directory: frontend
        run: npm test

      - name: Frontend - build
        working-directory: frontend
        run: npm run build

  docker_build_push:
    name: Docker build + push (ACR)
    runs-on: ubuntu-latest
    needs: build_test

    # Only push images on direct pushes (not PRs)
    if: github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build + push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/crud-backend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/crud-backend:${{ github.sha }}

      - name: Build + push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/crud-frontend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/crud-frontend:${{ github.sha }}
