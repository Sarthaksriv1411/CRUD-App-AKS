apiVersion: apps/v1
kind: Deployment
metadata:
  name: crud-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crud-frontend
  template:
    metadata:
      labels:
        app: crud-frontend
    spec:
      containers:
      - name: frontend
        image: akscrudapp.azurecr.io/crud-frontend:latest
        ports:
        - containerPort: 3000