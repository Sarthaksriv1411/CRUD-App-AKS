apiVersion: apps/v1
kind: Deployment
metadata:
  name: crud-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crud-backend
  template:
    metadata:
      labels:
        app: crud-backend
    spec:
      containers:
      - name: backend
        image: akscrudapp.azurecr.io/crud-backend:latest
        ports:
        - containerPort: 5050
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/task_manager"
        - name: PORT
          value: "5050"